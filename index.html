  <style>
    /* ── RESET & BASE ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #152038;
      --gold:  #C49A3C;
      --white: #FFFFFF;
      --gray:  #F5F5F3;
      --text:  #2D2D2D;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Jura', sans-serif;
      font-weight: 300;
      color: var(--text);
      background: var(--white);
      line-height: 1.7;
    }

    /* ── TYPOGRAPHY ── */
    h1, h2, h3 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 700;
      line-height: 1.15;
    }
    .eyebrow {
      font-family: 'Jura', sans-serif;
      font-weight: 300;
      letter-spacing: 0.22em;
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--gold);
    }
    p { font-size: 1.05rem; }

    /* ── LAYOUT HELPERS ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }
    .section { padding: 6rem 0; }
    .section--dark { background: var(--navy); color: var(--white); }
    .section--gray { background: var(--gray); }
    .gold-rule { width: 60px; height: 2px; background: var(--gold); margin: 1.2rem auto 2rem; }
    .gold-rule--left { margin-left: 0; }
    .text-center { text-align: center; }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(21, 32, 56, 0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(196, 154, 60, 0.25);
    }
    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      text-decoration: none;
    }
    .nav-needle {
      width: 16px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .nav-brand {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }
    .nav-brand-name {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 700;
      font-size: 1.35rem;
      letter-spacing: 0.12em;
      color: var(--white);
    }
    .nav-brand-tag {
      font-family: 'Jura', sans-serif;
      font-weight: 300;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      color: var(--gold);
    }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      color: rgba(255,255,255,0.72);
      text-decoration: none;
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--gold); }
    .nav-cta {
      background: var(--gold);
      color: var(--navy) !important;
      padding: 0.5rem 1.2rem;
      border-radius: 2px;
      font-family: 'Bricolage Grotesque', sans-serif !important;
      font-weight: 700 !important;
      letter-spacing: 0.08em !important;
      transition: opacity 0.2s !important;
    }
    .nav-cta:hover { opacity: 0.85; color: var(--navy) !important; }
    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 0.5rem; }
    .hamburger span {
      display: block; width: 22px; height: 2px;
      background: var(--white); margin: 5px 0;
      transition: all 0.3s;
    }

    /* ── HERO ── */
    #inicio {
      min-height: 100vh;
      background: var(--navy);
      position: relative;
      display: flex;
      align-items: center;
      overflow: hidden;
    }
    .hero-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(28,42,80,0.6) 1px, transparent 1px),
        linear-gradient(90deg, rgba(28,42,80,0.6) 1px, transparent 1px);
      background-size: 64px 64px;
    }
    .hero-inner {
      position: relative;
      z-index: 2;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem;
      padding-top: 100px;
    }
    .hero-needle {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .hero-needle-svg {
      flex-shrink: 0;
    }
    .hero-needle-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--gold), transparent);
    }
    h1.hero-title {
      font-size: clamp(3.2rem, 8vw, 6.5rem);
      color: var(--white);
      letter-spacing: 0.04em;
      margin-bottom: 1.2rem;
      max-width: 800px;
    }
    h1.hero-title span { color: var(--gold); }
    .hero-sub {
      font-size: 1.15rem;
      color: rgba(255,255,255,0.72);
      max-width: 520px;
      margin-bottom: 2.8rem;
      line-height: 1.8;
    }
    .hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--gold);
      color: var(--navy);
      text-decoration: none;
      padding: 0.9rem 2rem;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      border-radius: 2px;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      padding: 0.9rem 2rem;
      font-family: 'Jura', sans-serif;
      font-weight: 300;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 2px;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }
    .hero-frame {
      position: absolute;
      top: 84px; left: 1.5rem; right: 1.5rem; bottom: 1.5rem;
      border: 1px solid rgba(196,154,60,0.12);
      pointer-events: none;
      z-index: 1;
    }
    .hero-coords {
      position: absolute;
      bottom: 2rem; right: 2.5rem;
      z-index: 2;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.2);
    }

    /* ── PROBLEMA ── */
    #problema .problema-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: center;
    }
    #problema h2 { font-size: 2.6rem; color: var(--navy); margin-bottom: 1rem; }
    #problema .lead { font-size: 1.15rem; color: #555; margin-bottom: 2rem; }
    .symptom-list { list-style: none; display: flex; flex-direction: column; gap: 0.9rem; }
    .symptom-list li {
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
      font-size: 1rem;
      color: #444;
    }
    .symptom-list li::before {
      content: '';
      flex-shrink: 0;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      margin-top: 0.55rem;
    }
    .problema-quote {
      background: var(--navy);
      color: var(--white);
      padding: 3rem 2.5rem;
      position: relative;
    }
    .problema-quote::before {
      content: '"';
      position: absolute;
      top: 1rem;
      left: 2rem;
      font-size: 5rem;
      color: var(--gold);
      font-family: 'Bricolage Grotesque', sans-serif;
      line-height: 1;
      opacity: 0.6;
    }
    .problema-quote p {
      font-size: 1.2rem;
      line-height: 1.75;
      color: rgba(255,255,255,0.88);
      margin-top: 1.5rem;
    }
    .problema-quote cite {
      display: block;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      color: var(--gold);
    }

    /* ── SERVICIOS ── */
    #servicios h2 { font-size: 2.6rem; color: var(--white); margin-bottom: 0.5rem; }
    #servicios .section-intro {
      font-size: 1.05rem;
      color: rgba(255,255,255,0.7);
      max-width: 560px;
      margin: 0 auto 3.5rem;
    }
    .servicios-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }
    .servicio-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(196,154,60,0.2);
      padding: 2.5rem 2rem;
      transition: background 0.25s, border-color 0.25s;
    }
    .servicio-card:hover {
      background: rgba(196,154,60,0.06);
      border-color: rgba(196,154,60,0.5);
    }
    .servicio-num {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 2.5rem;
      color: rgba(196,154,60,0.25);
      line-height: 1;
      margin-bottom: 1.2rem;
    }
    .servicio-card h3 {
      font-size: 1.2rem;
      color: var(--white);
      margin-bottom: 0.8rem;
    }
    .servicio-card p { font-size: 0.92rem; color: rgba(255,255,255,0.65); line-height: 1.75; }
    .servicio-items {
      list-style: none;
      margin-top: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .servicio-items li {
      font-size: 0.82rem;
      color: rgba(196,154,60,0.85);
      letter-spacing: 0.05em;
      padding-left: 0.9rem;
      position: relative;
    }
    .servicio-items li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--gold);
      opacity: 0.5;
    }

    /* ── METODOLOGÍA ── */
    #metodologia h2 { font-size: 2.6rem; color: var(--navy); margin-bottom: 0.5rem; }
    #metodologia .section-intro {
      font-size: 1.05rem;
      color: #666;
      max-width: 540px;
      margin: 0 auto 3.5rem;
    }
    .metodo-steps {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      position: relative;
    }
    .metodo-steps::before {
      content: '';
      position: absolute;
      top: 38px;
      left: calc(12.5%);
      right: calc(12.5%);
      height: 1px;
      background: var(--gold);
      opacity: 0.4;
      z-index: 0;
    }
    .metodo-step {
      text-align: center;
      padding: 0 1.5rem 2rem;
      position: relative;
      z-index: 1;
    }
    .metodo-circle {
      width: 76px; height: 76px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      background: var(--white);
      position: relative;
      z-index: 2;
    }
    .metodo-circle-num {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.6rem;
      color: var(--gold);
    }
    .metodo-step h3 { font-size: 1.1rem; color: var(--navy); margin-bottom: 0.5rem; }
    .metodo-step p { font-size: 0.88rem; color: #666; line-height: 1.7; }

    /* ── SOBRE SOFÍA ── */
    #sofia { background: var(--gray); }
    .sofia-grid {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 5rem;
      align-items: center;
    }
    .sofia-photo {
      position: relative;
    }
    .sofia-photo-frame {
      aspect-ratio: 4/5;
      background: var(--navy);
      position: relative;
      overflow: hidden;
    }
    .sofia-photo-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      color: rgba(255,255,255,0.35);
      font-size: 0.8rem;
      letter-spacing: 0.15em;
    }
    .sofia-photo-frame::after {
      content: '';
      position: absolute;
      top: 16px; left: 16px; right: -16px; bottom: -16px;
      border: 1px solid var(--gold);
      z-index: -1;
    }
    #sofia .eyebrow { color: var(--gold); }
    #sofia h2 { font-size: 2.4rem; color: var(--navy); margin-bottom: 1rem; }
    .sofia-bio { font-size: 1.05rem; color: #555; margin-bottom: 1.5rem; line-height: 1.85; }
    .sofia-credenciales {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .credencial {
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
      font-size: 0.9rem;
      color: #444;
    }
    .credencial-dot {
      flex-shrink: 0;
      width: 20px; height: 20px;
      background: var(--navy);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 0.1rem;
    }
    .credencial-dot::after {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
    }

    /* ── TESTIMONIOS ── */
    #testimonios h2 { font-size: 2.4rem; color: var(--navy); margin-bottom: 0.5rem; }
    .testimonios-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-top: 3rem;
    }
    .testimonio {
      padding: 2.5rem;
      border-left: 3px solid var(--gold);
      background: var(--gray);
    }
    .testimonio-text {
      font-size: 1.05rem;
      color: #444;
      line-height: 1.85;
      font-style: italic;
      margin-bottom: 1.5rem;
    }
    .testimonio-autor strong {
      display: block;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 0.95rem;
      color: var(--navy);
    }
    .testimonio-autor span {
      font-size: 0.8rem;
      color: #888;
      letter-spacing: 0.08em;
    }

    /* ── CONTACTO ── */
    #contacto {
      background: var(--navy);
      position: relative;
      overflow: hidden;
    }
    #contacto .hero-grid {
      position: absolute;
      inset: 0;
      opacity: 0.5;
    }
    .contacto-inner {
      position: relative;
      z-index: 2;
    }
    #contacto h2 { font-size: 2.8rem; color: var(--white); margin-bottom: 1rem; max-width: 600px; margin-left: auto; margin-right: auto; }
    .contacto-sub {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.65);
      max-width: 500px;
      margin: 0 auto 3rem;
    }
    .contacto-datos {
      display: flex;
      justify-content: center;
      gap: 3rem;
      margin-top: 3rem;
      flex-wrap: wrap;
    }
    .contacto-dato {
      text-align: center;
    }
    .contacto-dato .eyebrow { margin-bottom: 0.3rem; display: block; }
    .contacto-dato p { color: rgba(255,255,255,0.75); font-size: 0.95rem; }

    /* ── BOTÓN DIAGNÓSTICO ── */
    .btn-diagnostico {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.85rem 1.8rem;
      background: transparent;
      border: 2px solid var(--gold);
      color: var(--gold);
      font-family: 'Jura', sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background .2s, color .2s;
      white-space: nowrap;
    }
    .btn-diagnostico:hover {
      background: var(--gold);
      color: var(--navy);
    }

    /* ── MODAL DIAGNÓSTICO ── */
    #modal-diagnostico {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(10,16,30,0.88);
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

x solid var(--gold);position:relative;overflow:hidden}\n.indicio::before{content:'';position:absolute;top:0;right:0;width:60px;height:60px;background:rgba(201,168,76,.06);border-radius:0 0 0 60px}\n.ind-numero{font-size:11px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}\n.ind-titulo{font-size:14px;font-weight:700;color:var(--gv);margin-bottom:6px;line-height:1.3}\n.ind-texto{font-size:13px;color:var(--muted);line-height:1.5}\n.ind-highlight{color:var(--gv);font-weight:700}\n\n/* CTA */\n.cta-section{max-width:820px;margin:0 auto;padding:0 20px 60px}\n.cta-card{background:var(--gv);border-radius:var(--r);padding:32px 28px;text-align:center;box-shadow:var(--shadow)}\n.cta-card h2{font-size:21px;font-weight:800;font-family:'Bricolage Grotesque',system-ui,sans-serif;color:#fff;margin-bottom:8px;line-height:1.3}\n.cta-card p{font-size:14px;color:rgba(255,255,255,.72);margin-bottom:24px;max-width:360px;margin-left:auto;margin-right:auto}\n.cta-btns{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}\n.btn{display:inline-flex;align-items:center;gap:7px;padding:13px 28px;border-radius:99px;font-size:14px;font-weight:700;cursor:pointer;border:none;text-decoration:none;transition:all .2s}\n.btn-gold{background:var(--gold);color:var(--gv)}\n.btn-gold:hover{filter:brightness(1.07);transform:translateY(-1px)}\n.btn-ghost{background:rgba(255,255,255,.13);color:#fff}\n.btn-ghost:hover{background:rgba(255,255,255,.2)}\n.cta-note{font-size:11px;color:rgba(255,255,255,.45);margin-top:16px}\n.footer{text-align:center;font-size:11px;color:var(--muted);padding:16px 20px 28px}\n.footer a{color:var(--muted)}\n\n/* COSTOS VARIABLES TOGGLE */\n.toggle-btn{width:100%;display:flex;align-items:center;justify-content:space-between;background:none;border:1.5px dashed #BFDBFE;border-radius:var(--r-sm);padding:10px 14px;cursor:pointer;color:var(--gm);font-size:13px;font-weight:600;transition:all .2s;margin-top:4px}\n.toggle-btn:hover{background:rgba(29,78,216,.05);border-color:var(--gm)}\n.toggle-arrow{transition:transform .25s;font-size:11px}\n.toggle-arrow.open{transform:rotate(180deg)}\n.cv-section{display:none;padding-top:14px;border-top:1px solid #DBEAFE;margin-top:14px}\n.cv-section.open{display:block;animation:fadeIn .25s ease}\n\n/* IB CALLOUT */\n.ib-callout{background:#FFFBEB;border:1.5px solid #FDE68A;border-radius:var(--r-sm);padding:10px 13px;margin-bottom:14px;display:flex;gap:9px;align-items:flex-start}\n.ib-icon{font-size:16px;flex-shrink:0;margin-top:1px}\n.ib-text{font-size:12px;color:#92400E;line-height:1.45}\n.ib-text strong{font-weight:700;display:block;margin-bottom:2px}\n\n/* HIDDEN */\n.hidden{display:none}\n.fade-in{animation:fadeIn .4s ease}\n@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}\n</style>\n<link href=\"https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..60,400;12..60,700;12..60,800&family=Jura:wght@300;400;600;700&display=swap\" rel=\"stylesheet\">\n</head>\n<body>\n\n<div class=\"header\">\n  <div class=\"logo\" style=\"font-family:'Bricolage Grotesque',system-ui,sans-serif;font-size:13px;letter-spacing:0.5px;\">R</div>\n  <div>\n    <div class=\"hname\" style=\"font-family:'Bricolage Grotesque',system-ui,sans-serif;letter-spacing:0.5px;\">RUMBO</div>\n    <div class=\"htag\">Tu GPS Empresarial</div>\n  </div>\n</div>\n\n<div class=\"hero\">\n  <h1>\u00bfSab\u00e9s en qu\u00e9 <em>estado</em> est\u00e1<br>tu negocio hoy?</h1>\n  <p>Antes de saber a d\u00f3nde ir, hay que saber desde d\u00f3nde se parte. Tres datos y ten\u00e9s un estado de situaci\u00f3n real \u2014 sin vueltas, sin tecnicismos.</p>\n</div>\n\n<div class=\"main\">\n\n  <!-- FORM -->\n  <div class=\"card\">\n    <div class=\"card-title\">Ingres\u00e1 tus n\u00fameros</div>\n\n    <div class=\"field\">\n      <label>Ventas del mes <span class=\"sub\">(facturaci\u00f3n total)</span></label>\n      <div class=\"input-wrap\">\n        <span class=\"pre\">$</span>\n        <input type=\"number\" id=\"ventas\" class=\"has-pre\" placeholder=\"Ej: 800.000\" min=\"0\" oninput=\"calcular()\">\n      </div>\n    </div>\n\n    <div class=\"field\">\n      <label>Margen de marcaci\u00f3n <span class=\"sub\">(sobre el costo)</span></label>\n      <div class=\"input-wrap\">\n        <input type=\"number\" id=\"marcacion\" class=\"has-suf\" placeholder=\"Ej: 80\" min=\"1\" max=\"1000\" oninput=\"calcular(); mostrarHelperMarcacion()\">\n        <span class=\"suf\">%</span>\n      </div>\n      <div class=\"hint\">Si compr\u00e1s algo a $100 y lo vend\u00e9s a $180, tu marcaci\u00f3n es 80%</div>\n      <div class=\"marcacion-helper\" id=\"helperMarcacion\"></div>\n    </div>\n\n    <div class=\"field\">\n      <label>Costos fijos del mes <span class=\"sub\">(los que pag\u00e1s siempre)</span></label>\n      <div class=\"input-wrap\">\n        <span class=\"pre\">$</span>\n        <input type=\"number\" id=\"costosF\" class=\"has-pre\" placeholder=\"Ej: 320.000\" min=\"0\" oninput=\"calcular()\">\n      </div>\n      <div class=\"hint\">Sueldos, alquiler, servicios, impuestos fijos \u2014 todo lo que no cambia si vend\u00e9s m\u00e1s o menos</div>\n    </div>\n\n    <!-- COSTOS VARIABLES TOGGLE -->\n    <button class=\"toggle-btn\" onclick=\"toggleCV()\" type=\"button\" id=\"toggleBtn\">\n      <span>\uff0b Agregar costos variables</span>\n      <span class=\"toggle-arrow\" id=\"toggleArrow\">\u25be</span>\n    </button>\n\n    <div class=\"cv-section\" id=\"cvSection\">\n\n      <div class=\"ib-callout\">\n        <div class=\"ib-icon\">\u26a0\ufe0f</div>\n        <div class=\"ib-text\">\n          <strong>\u00bfYa incluiste Ingresos Brutos en tus cuentas?</strong>\n          Es uno de los costos que m\u00e1s se olvida. Seg\u00fan tu actividad y provincia, puede ser entre el 1,5% y el 5% de tus ventas \u2014 y se paga sobre lo que factur\u00e1s, no sobre lo que gan\u00e1s.\n        </div>\n      </div>\n\n      <div class=\"field\">\n        <label>Ingresos Brutos <span class=\"sub\">(al\u00edcuota sobre ventas)</span></label>\n        <div class=\"input-wrap\">\n          <input type=\"number\" id=\"ibPct\" class=\"has-suf\" placeholder=\"Ej: 3\" min=\"0\" max=\"20\" step=\"0.5\" oninput=\"calcular()\">\n          <span class=\"suf\">%</span>\n        </div>\n        <div class=\"hint\" id=\"ibHint\">Ingres\u00e1 tu al\u00edcuota. Si no la sab\u00e9s, consult\u00e1 con tu contador o prob\u00e1 con 3%.</div>\n      </div>\n\n      <div class=\"field\">\n        <label>Otros costos variables <span class=\"sub\">(opcional)</span></label>\n        <div class=\"input-wrap\">\n          <span class=\"pre\">$</span>\n          <input type=\"number\" id=\"otrosCV\" class=\"has-pre\" placeholder=\"Ej: 45.000\" min=\"0\" oninput=\"calcular()\">\n        </div>\n        <div class=\"hint\">Comisiones, fletes, empaques, costos de transacci\u00f3n \u2014 lo que var\u00eda con cada venta</div>\n      </div>\n\n    </div>\n  </div>\n\n  <!-- RESULT -->\n  <div class=\"result-card\" id=\"resultCard\">\n    <div class=\"result-empty\" id=\"resultEmpty\">\n      <div class=\"ico\">\ud83d\udcca</div>\n      <div>Complet\u00e1 los tres campos<br>para ver tu diagn\u00f3stico.</div>\n    </div>\n\n    <div id=\"resultContent\" class=\"hidden\">\n      <div class=\"res-main\" id=\"resMain\">\n        <div class=\"res-label\">Resultado neto del mes</div>\n        <div class=\"res-valor\" id=\"resValor\">$0</div>\n        <div class=\"res-pct\" id=\"resPct\">0% de rentabilidad</div>\n        <div class=\"res-gps\" id=\"resGps\">\ud83e\udded GPS</div>\n      </div>\n\n      <div class=\"mini-grid\">\n        <div class=\"mini\">\n          <div class=\"mini-name\">Punto de Equilibrio</div>\n          <div class=\"mini-val\" id=\"miniPE\">\u2014</div>\n          <div class=\"mini-note\" id=\"miniPEnote\"></div>\n        </div>\n        <div class=\"mini\">\n          <div class=\"mini-name\">Margen sobre ventas</div>\n          <div class=\"mini-val\" id=\"miniMC\">\u2014</div>\n          <div class=\"mini-note\" id=\"miniMCnote\"></div>\n        </div>\n        <div class=\"mini\">\n          <div class=\"mini-name\">Costo de mercader\u00eda</div>\n          <div class=\"mini-val\" id=\"miniCM\">\u2014</div>\n          <div class=\"mini-note\" id=\"miniCMnote\"></div>\n        </div>\n        <div class=\"mini\">\n          <div class=\"mini-name\">Cobertura del PE</div>\n          <div class=\"mini-val\" id=\"miniCob\">\u2014</div>\n          <div class=\"mini-note\" id=\"miniCobnote\"></div>\n        </div>\n      </div>\n    </div>\n  </div>\n\n</div>\n\n<!-- INDICIOS -->\n<div class=\"indicios-section hidden\" id=\"indiciosSection\">\n  <div class=\"indicios-title\">\ud83d\udd0d Indicios para explorar con tu negocio</div>\n  <div class=\"indicios-grid\">\n    <div class=\"indicio\">\n      <div class=\"ind-numero\">Indicio 1</div>\n      <div class=\"ind-titulo\" id=\"ind1titulo\"></div>\n      <div class=\"ind-texto\" id=\"ind1texto\"></div>\n    </div>\n    <div class=\"indicio\">\n      <div class=\"ind-numero\">Indicio 2</div>\n      <div class=\"ind-titulo\" id=\"ind2titulo\"></div>\n      <div class=\"ind-texto\" id=\"ind2texto\"></div>\n    </div>\n    <div class=\"indicio\">\n      <div class=\"ind-numero\">Indicio 3</div>\n      <div class=\"ind-titulo\" id=\"ind3titulo\"></div>\n      <div class=\"ind-texto\" id=\"ind3texto\"></div>\n    </div>\n  </div>\n</div>\n\n<!-- CTA -->\n<div class=\"cta-section hidden\" id=\"ctaSection\">\n  <div class=\"cta-card\">\n    <h2>\u00bfQuer\u00e9s saber c\u00f3mo<br>mejorar estos n\u00fameros?</h2>\n    <p>Trabajamos juntos para que cada dato de tu negocio se convierta en una decisi\u00f3n concreta.</p>\n    <div class=\"cta-btns\">\n      <a href=\"https://wa.me/543764504726?text=Hola%20Sof\u00eda%2C%20quiero%20conocer%20m\u00e1s%20sobre%20RUMBO.\" class=\"btn btn-gold\">\ud83d\udcac Escribime por WhatsApp</a>\n      <a href=\"mailto:coachsofiaf@gmail.com?subject=Diagn\u00f3stico%20RUMBO%20-%20Quiero%20mejorar%20mis%20n\u00fameros\" class=\"btn btn-ghost\">\u2709 Mandar email</a>\n    </div>\n    <div class=\"cta-note\">coachsofiaf@gmail.com \u00b7 +54 376 450-4726</div>\n  </div>\n</div>\n\n<div class=\"footer\">RUMBO \u00b7 Consultor\u00eda Empresarial \u00b7 Sof\u00eda Fulquet \u00b7 Posadas, Misiones</div>\n\n<script>\n// \u2500\u2500 FORMAT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction fmt(v){\n  const abs=Math.abs(v);\n  const sign=v<0?'-':'';\n  if(abs>=1000000)return sign+'$'+(abs/1000000).toFixed(1)+'M';\n  if(abs>=1000)return sign+'$'+(abs/1000).toFixed(0)+'K';\n  return sign+'$'+abs.toFixed(0);\n}\nfunction fmtExact(v){\n  const abs=Math.abs(v);\n  const sign=v<0?'-':'';\n  return sign+'$'+abs.toLocaleString('es-AR',{maximumFractionDigits:0});\n}\n\n// \u2500\u2500 TOGGLE CV \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction toggleCV(){\n  const sec=document.getElementById('cvSection');\n  const arr=document.getElementById('toggleArrow');\n  const btn=document.getElementById('toggleBtn');\n  const open=sec.classList.toggle('open');\n  arr.classList.toggle('open',open);\n  btn.querySelector('span').textContent=open?'\u2014 Ocultar costos variables':'\uff0b Agregar costos variables';\n}\n\n// \u2500\u2500 HELPER MARCACI\u00d3N \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction mostrarHelperMarcacion(){\n  const m=parseFloat(document.getElementById('marcacion').value);\n  const el=document.getElementById('helperMarcacion');\n  if(!m||m<=0){el.style.display='none';return;}\n  const pv=(100+m).toFixed(0);\n  el.style.display='block';\n  el.innerHTML=`Si compr\u00e1s algo a <strong>$100</strong>, lo vend\u00e9s a <strong>$${pv}</strong> \u2014 qued\u00e1ndote $${m.toFixed(0)} de cada $100 de costo.`;\n}\n\n// \u2500\u2500 MAIN CALC \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction calcular(){\n  const ventas=parseFloat(document.getElementById('ventas').value)||0;\n  const marcacion=parseFloat(document.getElementById('marcacion').value)||0;\n  const cf=parseFloat(document.getElementById('costosF').value)||0;\n\n  const ibPct    = parseFloat(document.getElementById('ibPct').value)   || 0;\n  const otrosCV  = parseFloat(document.getElementById('otrosCV').value) || 0;\n\n  if(ventas<=0||marcacion<=0||cf<0){\n    document.getElementById('resultEmpty').classList.remove('hidden');\n    document.getElementById('resultContent').classList.add('hidden');\n    document.getElementById('indiciosSection').classList.add('hidden');\n    document.getElementById('ctaSection').classList.add('hidden');\n    return;\n  }\n\n  // \u2500\u2500 Core calcs \u2500\u2500\n  // marcaci\u00f3n = (PV - PC) / PC \u00d7 100  \u2192  PC = PV / (1 + m/100)\n  const costoMerch = ventas / (1 + marcacion/100);\n  const ibAbs      = ventas * ibPct / 100;\n  const mcAbs      = ventas - costoMerch - ibAbs - otrosCV; // margen neto de variables\n  const mcPct      = ventas>0 ? mcAbs / ventas * 100 : 0;\n  const resultado  = mcAbs - cf;\n  const resultPct  = ventas>0 ? resultado/ventas*100 : 0;\n  const PE         = mcPct>0 ? cf / (mcPct/100) : Infinity;\n  const cobertura  = ventas>0 ? (ventas - PE)/ventas*100 : 0;\n  const peVsPct    = ventas>0 ? PE/ventas*100 : 100;\n\n  // \u2500\u2500 IB hint \u2500\u2500\n  if(ibPct>0){\n    document.getElementById('ibHint').textContent=\n      'En tu negocio, Ingresos Brutos te cuesta '+fmt(ibAbs)+'/mes ('+ibPct+'% de '+fmt(ventas)+').';\n  } else {\n    document.getElementById('ibHint').textContent='Ingres\u00e1 tu al\u00edcuota. Si no la sab\u00e9s, consult\u00e1 con tu contador o prob\u00e1 con 3%.';\n  }\n\n  // \u2500\u2500 Sem\u00e1foro \u2500\u2500\n  let color='amarillo',gpsText='\ud83d\udfe1 Recalculando ruta';\n  if(resultado>0 && resultPct>=8){color='verde';gpsText='\ud83d\udfe2 En ruta';}\n  else if(resultado<=0){color='rojo';gpsText='\ud83d\udd34 Fuera del camino';}\n\n  // \u2500\u2500 Resultado principal \u2500\u2500\n  document.getElementById('resultEmpty').classList.add('hidden');\n  const rc=document.getElementById('resultContent');\n  if(rc.classList.contains('hidden')){rc.classList.remove('hidden');rc.classList.add('fade-in');}\n\n  const rm=document.getElementById('resMain');\n  rm.className='res-main '+color;\n  const rv=document.getElementById('resValor');\n  rv.className='res-valor '+color;\n  rv.textContent=fmtExact(resultado);\n  const rp=document.getElementById('resPct');\n  rp.className='res-pct '+color;\n  rp.textContent=resultPct.toFixed(1)+'% de rentabilidad';\n  const rg=document.getElementById('resGps');\n  rg.className='res-gps '+color;\n  rg.textContent=gpsText;\n\n  // \u2500\u2500 Mini indicators \u2500\u2500\n  document.getElementById('miniPE').innerHTML=PE===Infinity?'Sin cubierta':fmt(PE)+'<small></small>';\n  document.getElementById('miniPEnote').textContent=PE===Infinity?'No alcanz\u00e1s el equilibrio':\n    (ventas>=PE?'Vend\u00e9s $'+(fmt(ventas-PE))+' por encima':'Te faltan $'+fmt(PE-ventas)+' para cubrir costos');\n\n  document.getElementById('miniMC').innerHTML=mcPct.toFixed(1)+'<small>%</small>';\n  document.getElementById('miniMCnote').textContent='De cada $100 vendidos, $'+mcPct.toFixed(0)+' cubre estructura y ganancia';\n\n  document.getElementById('miniCM').innerHTML=fmt(costoMerch)+'<small></small>';\n  document.getElementById('miniCMnote').textContent=(costoMerch/ventas*100).toFixed(0)+'% de tus ventas son costo de mercader\u00eda';\n\n  const cobText=cobertura>0?'+'+cobertura.toFixed(0)+'% sobre PE':cobertura.toFixed(0)+'% bajo PE';\n  document.getElementById('miniCob').innerHTML=cobText;\n  document.getElementById('miniCobnote').textContent=cobertura>0?\n    'Tus ventas pueden caer '+(cobertura.toFixed(0))+'% antes de entrar en p\u00e9rdida':\n    'Est\u00e1s operando por debajo del punto de equilibrio';\n\n  // \u2500\u2500 Indicios \u2500\u2500\n  const marcacion5 = marcacion + 5;\n  const mcAbs5     = ventas / (1 + marcacion5/100);\n  const resultado5 = (ventas - ventas/(1+marcacion5/100)) - cf;\n  const mejora5    = resultado5 - resultado;\n\n  const ventasObj10 = cf / (mcPct/100 - 0.10); // ventas para 10% rentabilidad\n  const diffVentas  = ventasObj10 - ventas;\n\n  const cfRedu  = cf * 0.90;\n  const mejoraCF= cf * 0.10;\n\n  const marcMinima = cf / ventas * 100 / (1 - cf/ventas/2); // aprox\n  const mcPctMinima = cf / ventas * 100; // para resultado = 0\n  const marcMinExacta = mcPctMinima * 100 / (100 - mcPctMinima);\n\n  document.getElementById('indiciosSection').classList.remove('hidden');\n  document.getElementById('ctaSection').classList.remove('hidden');\n\n  // Indicio 1: efecto de subir marcaci\u00f3n\n  document.getElementById('ind1titulo').textContent='\u00bfQu\u00e9 pasa si sub\u00eds la marcaci\u00f3n 5 puntos?';\n  if(mejora5>0){\n    document.getElementById('ind1texto').innerHTML=\n      `Pasar de ${marcacion.toFixed(0)}% a ${marcacion5.toFixed(0)}% de marcaci\u00f3n mejorar\u00eda tu resultado en <span class=\"ind-highlight\">${fmt(mejora5)}/mes</span> \u2014 sin vender un peso m\u00e1s. Son <span class=\"ind-highlight\">${fmt(mejora5*12)}/a\u00f1o</span> de diferencia.`;\n  } else {\n    document.getElementById('ind1texto').innerHTML=\n      `Con tu estructura de costos actual, necesit\u00e1s revisar si la marcaci\u00f3n es el \u00fanico camino o si hay otras palancas. <span class=\"ind-highlight\">Un an\u00e1lisis de precios puede mostrar el camino.</span>`;\n  }\n\n  // Indicio 2: ventas necesarias para 10% de rentabilidad\n  document.getElementById('ind2titulo').textContent='\u00bfCu\u00e1nto necesit\u00e1s vender para ganar bien?';\n  if(mcPct>10){\n    if(diffVentas>0){\n      document.getElementById('ind2texto').innerHTML=\n        `Para alcanzar una rentabilidad del 10%, necesit\u00e1s vender <span class=\"ind-highlight\">${fmt(ventasObj10)}/mes</span> \u2014 <span class=\"ind-highlight\">${fmt(diffVentas)} m\u00e1s</span> que hoy. La pregunta es: \u00bfest\u00e1 en el mercado, o hay que construirlo?`;\n    } else {\n      document.getElementById('ind2texto').innerHTML=\n        `Ya super\u00e1s el 10% de rentabilidad. La pregunta ahora es <span class=\"ind-highlight\">c\u00f3mo sostener esto con escala</span> \u2014 porque crecer sin estructura puede erosionar este margen.`;\n    }\n  } else {\n    document.getElementById('ind2texto').innerHTML=\n      `Con el margen actual, cada peso de venta adicional contribuye poco al resultado. <span class=\"ind-highlight\">Antes de vender m\u00e1s, puede ser m\u00e1s inteligente mejorar el margen.</span>`;\n  }\n\n  // Indicio 3: IB si no lo cargaron, o estructura de costos\n  if(ibPct===0){\n    const ibEjemplo3 = ventas * 3 / 100;\n    const resultadoConIB = resultado - ibEjemplo3;\n    document.getElementById('ind3titulo').textContent='\u00bfYa incluiste Ingresos Brutos?';\n    document.getElementById('ind3texto').innerHTML=\n      `Es el impuesto que m\u00e1s se pasa por alto. Si tu al\u00edcuota fuera del 3%, <span class=\"ind-highlight\">estar\u00edas pagando ${fmt(ibEjemplo3)}/mes</span> \u2014 que hoy no aparece en tus cuentas. Con ese costo, tu resultado real ser\u00eda <span class=\"ind-highlight\">${fmt(resultadoConIB)}</span>. \u00bfLo ten\u00e9s contemplado en tus precios?`;\n  } else {\n    const cfVsPct = cf/ventas*100;\n    document.getElementById('ind3titulo').textContent='Tu estructura: \u00bfaliada o limitante?';\n    if(cfVsPct>(mcPct+ibPct)){\n      document.getElementById('ind3texto').innerHTML=\n        `Tus costos fijos (${cfVsPct.toFixed(0)}% de ventas) superan lo que queda despu\u00e9s de mercader\u00eda e impuestos (${mcPct.toFixed(0)}%). <span class=\"ind-highlight\">La estructura consume m\u00e1s de lo que el negocio genera.</span> Aqu\u00ed est\u00e1 la causa ra\u00edz.`;\n    } else {\n      document.getElementById('ind3texto').innerHTML=\n        `Con IB incluido, tu margen operativo real es del <span class=\"ind-highlight\">${mcPct.toFixed(1)}%</span>. La pregunta es si ese margen aguanta una ca\u00edda de ventas del 15-20% sin entrar en p\u00e9rdida \u2014 y si la respuesta es no, hay trabajo por hacer.`;\n    }\n  }\n}\n<\/script>\n</body>\n</html>\n";

    function abrirDiagnostico() {
      const modal = document.getElementById('modal-diagnostico');
      const iframe = document.getElementById('diagnostico-iframe');
      if (!iframe.srcdoc) {
        iframe.srcdoc = DIAG_HTML;
      }
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function cerrarDiagnostico() {
      document.getElementById('modal-diagnostico').classList.remove('open');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarDiagnostico(); });

    // Smooth scroll offset for fixed nav
    document.querySelectorAll('a[href^="#"]').forEach(a => {
      a.addEventListener('click', e => {
        const target = document.querySelector(a.getAttribute('href'));
        if (target) {
          e.preventDefault();
          const offset = 72;
          window.scrollTo({ top: target.offsetTop - offset, behavior: 'smooth' });
        }
      });
    });
